     <div id="enter">

        <p>мышь которая в ребусе попавшая через запятую в наш мир со слоном в конце</p>
        <div class="views">
👁 <span id="viewCount">0</span>
</div>
    </div>
 
<script>
let viewed = localStorage.getItem("viewed");
let views = localStorage.getItem("views");

if(!views){
views = 0;
}

if(!viewed){
views++;
localStorage.setItem("views", views);
localStorage.setItem("viewed", true);
}

document.getElementById("viewCount").textContent = views;


</script>
<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const volumeControl = document.getElementById("volumeControl");

// Устанавливаем начальную громкость
music.volume = 1;
volumeControl.value = 1;

// Попытка автозапуска музыки при загрузке страницы
window.addEventListener("load", () => {
    music.muted = false; // снимаем mute
    music.play().catch(e => {
        console.log("Автозапуск заблокирован браузером:", e);
    });
});

// Управление громкостью через ползунок
volumeControl.addEventListener("input", () => {
    music.volume = volumeControl.value;
});

// Кнопка "Click to enter" – включение музыки и скрытие кнопки
enter.addEventListener("click", () => {
    music.volume = 1;
    music.play();
    enter.style.display = "none";
});

// Запрет перетаскивания элементов на странице
document.addEventListener("dragstart", e => e.preventDefault());

</script>
<script>
const siteTitle = "@tihiy_gosty"; // Текст для вкладки
let index = 0;
let forward = true; // true — печатаем, false — стираем

function animateTitle() {
    if (forward) {
        // Печатаем по буквам
        document.title = siteTitle.slice(0, index + 1);
        index++;
        if (index === siteTitle.length) forward = false; // достигли конца → начинаем стирать
    } else {
        // Стираем по буквам
        document.title = siteTitle.slice(0, index - 1);
        index--;
        if (index === 0) forward = true; // достигли начала → начинаем печатать
    }

    setTimeout(animateTitle, 200); // скорость эффекта (мс между буквами)
}

// Запуск анимации при загрузке страницы
window.addEventListener("load", animateTitle);
</script>
</body>
