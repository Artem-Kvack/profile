<script>
let viewed = localStorage.getItem("viewed");
let views = localStorage.getItem("views");

if(!views){
views = 0;
}

if(!viewed){
views++;
localStorage.setItem("views", views);
localStorage.setItem("viewed", true);
}

document.getElementById("viewCount").textContent = views;


</script>
<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const volumeControl = document.getElementById("volumeControl");

// Устанавливаем начальную громкость
music.volume = 1;
volumeControl.value = 1;

// Попытка автозапуска музыки при загрузке страницы
window.addEventListener("load", () => {
    music.muted = false; // снимаем mute
    music.play().catch(e => {
        console.log("Автозапуск заблокирован браузером:", e);
    });
});

// Управление громкостью через ползунок
volumeControl.addEventListener("input", () => {
    music.volume = volumeControl.value;
});

// Кнопка "Click to enter" – включение музыки и скрытие кнопки
enter.addEventListener("click", () => {
    music.volume = 1;
    music.play();
    enter.style.display = "none";
});

// Запрет перетаскивания элементов на странице
document.addEventListener("dragstart", e => e.preventDefault());

</script>
<script>
const siteTitle = "@tihiy_gosty"; // Текст для вкладки
let index = 0;
let forward = true; // true — печатаем, false — стираем

function animateTitle() {
    if (forward) {
        // Печатаем по буквам
        document.title = siteTitle.slice(0, index + 1);
        index++;
        if (index === siteTitle.length) forward = false; // достигли конца → начинаем стирать
    } else {
        // Стираем по буквам
        document.title = siteTitle.slice(0, index - 1);
        index--;
        if (index === 0) forward = true; // достигли начала → начинаем печатать
    }

    setTimeout(animateTitle, 200); // скорость эффекта (мс между буквами)
}

// Запуск анимации при загрузке страницы
window.addEventListener("load", animateTitle);
</script>
<script>
(function () {
    const card = document.querySelector(".prof");
    const wrap = document.querySelector(".prof-wrap");

    // --- состояние ---
    let rotX = 0, rotY = 0;       // текущий наклон
    let velX = 0, velY = 0;       // скорость
    let tgtX = 0, tgtY = 0;       // цель
    let hovered = false;
    let lastT = null;

    // --- параметры физики ---
    const STIFFNESS  = 0.12;  // жёсткость пружины
    const DAMPING    = 0.60;  // затухание — меньше = желейнее
    const MAX_TILT   = 16;    // градусов
    const FLOAT_AMP  = 10;    // пиксель float-амплитуды
    const FLOAT_FREQ = 0.0007; // частота float

    function tick(time) {
        if (!lastT) lastT = time;
        const dt = Math.min((time - lastT) / 16.67, 4); // нормируем к 60fps
        lastT = time;

        // пружинная физика
        velX = (velX + (tgtX - rotX) * STIFFNESS * dt) * Math.pow(DAMPING, dt);
        velY = (velY + (tgtY - rotY) * STIFFNESS * dt) * Math.pow(DAMPING, dt);
        rotX += velX;
        rotY += velY;

        // float на базе синуса — две частоты = органичное покачивание
        const floatY = hovered ? 0
            : Math.sin(time * FLOAT_FREQ) * FLOAT_AMP
            + Math.sin(time * FLOAT_FREQ * 1.65) * 2.5;

        card.style.transform =
            `translateY(${floatY}px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;

        requestAnimationFrame(tick);
    }

    card.addEventListener("mousemove", (e) => {
        const r = card.getBoundingClientRect();
        const nx = (e.clientX - r.left) / r.width  * 2 - 1; // -1..1
        const ny = (e.clientY - r.top)  / r.height * 2 - 1; // -1..1
        tgtX = -ny * MAX_TILT;
        tgtY =  nx * MAX_TILT;
        hovered = true;
    });

    card.addEventListener("mouseleave", () => {
        tgtX = 0;
        tgtY = 0;
        hovered = false;
    });

    requestAnimationFrame(tick);
}());
</script>
</body>
</html>
